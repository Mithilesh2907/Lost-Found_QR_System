spring.application.name=lostfound

spring.datasource.url=jdbc:postgresql://localhost:5432/lostfound
spring.datasource.username=postgres
spring.datasource.password=postgres123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Explicitly set dialect so Hibernate never needs a live DB connection to detect it
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Server port (Render injects PORT; defaults to 8080 locally) ---
server.port=${PORT:8080}

# --- JWT secret (override via JWT_SECRET env var on Render) ---
jwt.secret=${JWT_SECRET:MySuperSecretKeyForAnonymousQRFinderProjectWhichMustBeAtLeast32BytesLong!}

# --- CORS allowed origins (comma-separated; override via CORS_ALLOWED_ORIGINS on Render) ---
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://lost-found-qr-system.vercel.app,https://*.vercel.app}
